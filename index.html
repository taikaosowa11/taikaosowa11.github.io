<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tai</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<!--
  Landing page: full-bleed photo, click anywhere to enter the site.
  To set your photo: add a file named "landing.jpg" to the images/
  folder. Nothing else needs to change — if the file is missing,
  a plain placeholder shows instead so the page still looks fine.
-->
<a class="landing" href="about.html" aria-label="Enter site">
  <img class="landing-photo" src="images/landing.jpg" alt=""
       onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'landing-fallback',innerHTML:'<span>add images/landing.jpg</span>'}));">
  <span class="landing-hint">Click anywhere to enter</span>
</a>
</body>
</html>
